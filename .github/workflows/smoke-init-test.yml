name: tscircuit Smoke Init Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-init-test:
    runs-on: ubuntu-latest
    if: "${{ github.event_name != 'pull_request' || github.event.pull_request.title != 'chore: bump version' }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build package
        run: bun run build

      - name: Pack package
        run: bun pm pack

      - name: Create temporary directory
        run: |
          TEMP_DIR=$(mktemp -d)
          echo "TEMP_DIR=$TEMP_DIR" >> $GITHUB_ENV

      - name: Install tscircuit globally from packed file
        run: |
          PACKAGE_FILE=$(ls *.tgz)
          npm install -g "$PACKAGE_FILE"

      - name: Test tsci launches without bun on PATH
        run: |
          BUN_BIN_DIR=$(dirname "$(command -v bun)")
          FILTERED_PATH=$(node -e 'const path = process.env.PATH.split(":").filter((p) => p !== process.argv[1]); process.stdout.write(path.join(":"))' "$BUN_BIN_DIR")
          PATH="$FILTERED_PATH" tsci --help

      - name: Test tsci init starts and creates a project in temporary directory
        run: |
          cd "$TEMP_DIR"
          tsci init -y
          ls -la
          test -f package.json || (echo "package.json not found" && exit 1)
          test -f index.circuit.tsx || (echo "index.circuit.tsx not found" && exit 1)
